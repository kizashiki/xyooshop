<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robux Gift Card - Xyoo Shop</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1e 0%, #1a0f2e 50%, #0f0f1e 100%);
            min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            color: #fff; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .payment-box {
            background: rgba(139, 92, 246, 0.1); border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 20px; padding: 40px; max-width: 500px; width: 100%; text-align: center;
        }
        .payment-box h1 {
            font-size: 32px; margin-bottom: 20px; background: linear-gradient(to right, #f472b6, #c084fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .order-details {
            background: rgba(0,0,0,0.3); border-radius: 12px; padding: 20px; margin: 20px 0; text-align: left;
        }
        .order-details p { margin: 10px 0; font-size: 16px; }
        .input-group { margin: 25px 0; }
        .input-group label { display: block; margin-bottom: 8px; color: #b8b0c8; }
        .input-group input {
            width: 100%; padding: 14px; background: rgba(0,0,0,0.3);
            border: 2px solid rgba(139, 92, 246, 0.3); border-radius: 8px;
            color: white; font-size: 16px; text-align: center; letter-spacing: 2px;
        }
        .input-group input:focus { outline: none; border-color: #ec4899; }
        .btn {
            background: linear-gradient(to right, #ec4899, #a855f7); color: white; border: none;
            padding: 14px 30px; border-radius: 8px; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: all 0.3s; display: inline-block; text-decoration: none;
            margin: 10px 5px; width: 100%;
        }
        .btn:hover { transform: scale(1.02); }
        .btn-secondary {
            background: rgba(139, 92, 246, 0.2); border: 1px solid rgba(139, 92, 246, 0.4);
            margin-top: 10px;
        }
        .error-message { color: #ef4444; font-size: 14px; margin-top: 5px; display: none; }
        .loading-spinner {
            display: inline-block; width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3); border-radius: 50%;
            border-top-color: #fff; animation: spin 1s ease-in-out infinite; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="payment-box">
        <h1>🎮 Robux Gift Card</h1>
        <div class="order-details">
            <p><strong>Order ID:</strong> <span id="displayOrderId">Loading...</span></p>
            <p><strong>Status:</strong> <span style="color: #eab308;" id="orderStatus">⏳ Awaiting Code</span></p>
        </div>
        <div class="input-group">
            <label>Enter your Robux Gift Card code:</label>
            <input type="text" id="giftCardCode" placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="19">
            <div class="error-message" id="codeError">Please enter a valid code</div>
        </div>
        <button class="btn" id="submitBtn" onclick="submitCode()">✅ Done Payment</button>
        <a href="/" class="btn btn-secondary" style="display:block;">🏠 Back to Shop</a>
    </div>
    <script>
        const API_KEY = 'fzRFHIqB8u2WCU5mvGyPZK4tdj9Yw3gcrhLE7MSnVoeiplskTXaQO6bN0AxDJ1';
        const GUILD_ID = '1129463696737972267';
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('order') || 'N/A';
        document.getElementById('displayOrderId').textContent = orderId;

        async function submitCode() {
            const codeInput = document.getElementById('giftCardCode');
            const code = codeInput.value.trim();
            const errorDiv = document.getElementById('codeError');
            const submitBtn = document.getElementById('submitBtn');
            const statusEl = document.getElementById('orderStatus');
            if (!code || code.length < 4) { errorDiv.style.display = 'block'; return; }
            errorDiv.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner"></span> Creating thread...';
            statusEl.innerHTML = '⏳ Creating order thread...';
            const orders = JSON.parse(localStorage.getItem('xyoo_orders') || '[]');
            const order = orders.find(o => o.id === orderId);
            if (!order) {
                alert('Order not found.');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '✅ Done Payment';
                statusEl.innerHTML = '⏳ Awaiting Code';
                return;
            }
            const orderData = {
                orderId: order.id, date: order.date,
                items: order.items.map(item => ({ name: item.name, price: item.price, quantity: item.quantity })),
                total: order.total, paymentMethod: '🎮 ROBUX GIFT CARD',
                discordUser: order.discordUser || ''
            };
            try {
                const res = await fetch('/api/order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
                    body: JSON.stringify(orderData)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Failed to create thread');
                const threadId = data.thread_id;
                order.status = 'Payment Sent';
                order.giftCardCode = code;
                localStorage.setItem('xyoo_orders', JSON.stringify(orders));
                statusEl.innerHTML = '⏳ Sending code...';
                await fetch('/api/submit-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
                    body: JSON.stringify({ orderId, code, threadId })
                });
                statusEl.innerHTML = '✅ Code submitted!';
                setTimeout(() => { window.location.href = `https://discord.com/channels/${GUILD_ID}/${threadId}`; }, 1500);
            } catch (err) {
                console.error(err);
                errorDiv.textContent = '❌ Failed to process. Please contact support.';
                errorDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerHTML = '✅ Done Payment';
                statusEl.innerHTML = '⏳ Awaiting Code';
            }
        }
    </script>
</body>
</html>
