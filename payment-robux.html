<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robux Gift Card - Xyoo Shop</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <style> /* ... same styles ... */ </style>
</head>
<body>
    <div class="payment-box">
        <h1>🎮 Robux Gift Card</h1>
        <div class="order-details">
            <p><strong>Order ID:</strong> <span id="displayOrderId">Loading...</span></p>
            <p><strong>Status:</strong> <span style="color: #eab308;" id="orderStatus">⏳ Awaiting Code</span></p>
        </div>
        <div class="input-group">
            <label>Enter your Robux Gift Card code:</label>
            <input type="text" id="giftCardCode" placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="19">
            <div class="error-message" id="codeError">Please enter a valid code</div>
        </div>
        <button class="btn" id="submitBtn" onclick="submitCode()">✅ Done Payment</button>
        <a href="/" class="btn btn-secondary" style="display:block;">🏠 Back to Shop</a>
    </div>
    <script>
        const API_KEY = 'fzRFHIqB8u2WCU5mvGyPZK4tdj9Yw3gcrhLE7MSnVoeiplskTXaQO6bN0AxDJ1';
        const GUILD_ID = '1129463696737972267';
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('order') || 'N/A';
        document.getElementById('displayOrderId').textContent = orderId;

        async function submitCode() {
            const codeInput = document.getElementById('giftCardCode');
            const code = codeInput.value.trim();
            const errorDiv = document.getElementById('codeError');
            const submitBtn = document.getElementById('submitBtn');
            const statusEl = document.getElementById('orderStatus');
            if (!code || code.length < 4) { errorDiv.style.display = 'block'; return; }
            errorDiv.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner"></span> Creating thread...';
            statusEl.innerHTML = '⏳ Creating order thread...';
            const orders = JSON.parse(localStorage.getItem('xyoo_orders') || '[]');
            const order = orders.find(o => o.id === orderId);
            if (!order) {
                alert('Order not found.');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '✅ Done Payment';
                statusEl.innerHTML = '⏳ Awaiting Code';
                return;
            }
            const orderData = {
                orderId: order.id, date: order.date,
                items: order.items.map(item => ({ name: item.name, price: item.price, quantity: item.quantity })),
                total: order.total, paymentMethod: '🎮 ROBUX GIFT CARD',
                discordUser: order.discordUser || ''
            };
            try {
                const res = await fetch('/api/order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
                    body: JSON.stringify(orderData)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Failed to create thread');
                const threadId = data.thread_id;
                order.status = 'Payment Sent';
                order.giftCardCode = code;
                localStorage.setItem('xyoo_orders', JSON.stringify(orders));
                statusEl.innerHTML = '⏳ Sending code...';
                await fetch('/api/submit-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
                    body: JSON.stringify({ orderId, code, threadId })
                });
                statusEl.innerHTML = '✅ Code submitted!';
                setTimeout(() => { window.location.href = `https://discord.com/channels/${GUILD_ID}/${threadId}`; }, 1500);
            } catch (err) {
                console.error(err);
                errorDiv.textContent = '❌ Failed to process. Please contact support.';
                errorDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerHTML = '✅ Done Payment';
                statusEl.innerHTML = '⏳ Awaiting Code';
            }
        }
    </script>
</body>
</html>
