<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Xyoo Shop – Roblox Games</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #11071f;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ---- AURA CURSOR ---- */
    .cursor-aura {
      position: fixed;
      width: 70px; height: 70px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(255,42,157,0.5) 0%, rgba(139,92,246,0.2) 50%, transparent 70%);
      box-shadow: 0 0 30px #ff2a9d, 0 0 60px #8b5cf6;
      animation: auraPulse 2s infinite alternate;
    }
    @keyframes auraPulse {
      0% { transform: translate(-50%, -50%) scale(1); opacity:0.8; }
      100% { transform: translate(-50%, -50%) scale(1.3); opacity:1; }
    }

    /* ---- GLOWING TEXT & BUTTONS ---- */
    h1, h2, h3 {
      text-shadow: 0 0 15px #ff2a9d, 0 0 30px #8b5cf6;
    }
    .btn {
      background: transparent;
      border: 1px solid #8b5cf6;
      color: #fff;
      padding: 8px 18px;
      border-radius: 20px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .btn:hover { border-color: #ff2a9d; box-shadow: 0 0 12px #ff2a9d; }
    .btn-primary {
      background: #ff2a9d;
      border: none;
      box-shadow: 0 0 12px #ff2a9d;
    }
    .btn-primary:hover { box-shadow: 0 0 20px #ff2a9d; }

    /* ---- NAVIGATION BAR ---- */
    .navbar {
      background: rgba(17,7,31,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(139,92,246,0.3);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 15px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-left {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .logo {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(to right, #fff, #ff2a9d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      cursor: pointer;
    }
    .nav-links {
      display: flex;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
    }
    .nav-links a, .nav-links button {
      color: #bbb;
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.2s;
      padding: 6px 4px;
    }
    .nav-links a:hover, .nav-links button:hover { color: #ff2a9d; }
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,42,157,0.15);
      border: 1px solid #ff2a9d;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      color: #ff2a9d;
      animation: livePulse 1.8s infinite;
    }
    @keyframes livePulse {
      0%, 100% { box-shadow: 0 0 5px #ff2a9d; }
      50% { box-shadow: 0 0 18px #ff2a9d; }
    }
    .live-dot {
      width: 8px; height: 8px;
      background: #ff2a9d;
      border-radius: 50%;
      animation: livePulse 1.8s infinite;
    }
    .search-bar {
      background: rgba(255,255,255,0.08);
      border: 1px solid #8b5cf6;
      border-radius: 20px;
      padding: 6px 14px;
      color: #fff;
      outline: none;
      width: 180px;
      transition: 0.2s;
    }
    .search-bar::placeholder { color: #aaa; }
    .search-bar:focus { border-color: #ff2a9d; box-shadow: 0 0 10px #ff2a9d; }
    .sign-in-btn {
      background: #ff2a9d;
      color: #fff;
      border: none;
      padding: 8px 18px;
      border-radius: 20px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      font-size: 14px;
    }
    .sign-in-btn:hover { box-shadow: 0 0 12px #ff2a9d; }

    .cart-btn {
      position: relative;
      background: rgba(255,42,157,0.2);
      border: 1px solid #ff2a9d;
      border-radius: 20px;
      padding: 8px 16px;
      color: #ff2a9d;
      font-weight: 600;
      cursor: pointer;
    }
    .cart-badge {
      position: absolute;
      top: -6px; right: -6px;
      background: #ff2a9d;
      color: #fff;
      border-radius: 50%;
      width: 20px; height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }

    /* ---- BANNER ---- */
    .banner {
      background: linear-gradient(135deg, rgba(255,42,157,0.15), rgba(139,92,246,0.1));
      border: 1px solid rgba(139,92,246,0.3);
      border-radius: 16px;
      padding: 24px;
      margin: 24px auto;
      max-width: 1200px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .banner h2 {
      font-size: 32px;
      background: linear-gradient(to right, #fff, #ff2a9d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .messages-icon {
      background: rgba(255,42,157,0.2);
      border-radius: 12px;
      padding: 10px 16px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 18px;
    }
    .messages-icon:hover { background: rgba(255,42,157,0.4); }

    /* ---- TRUST BADGES ---- */
    .trust-badges {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin: 10px auto 20px;
      max-width: 1200px;
    }
    .badge {
      background: rgba(255,42,157,0.12);
      border: 1px solid #ff2a9d;
      color: #ff2a9d;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    /* ---- WELCOME BANNER ---- */
    .welcome-banner {
      text-align: center;
      background: rgba(255,42,157,0.08);
      border: 1px solid #8b5cf6;
      border-radius: 12px;
      padding: 16px;
      margin: 20px auto;
      max-width: 600px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .welcome-banner.show { display: flex; }
    .welcome-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #ff2a9d;
    }

    /* ---- CATALOG ---- */
    .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
    .page-section { display: none; }
    .page-section.active { display: block; }

    .category-tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 20px 0;
    }
    .catalog-title {
      font-size: 28px;
      font-weight: 700;
      margin: 20px 0;
      background: linear-gradient(to right, #fff, #ff2a9d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }
    .product-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(139,92,246,0.3);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      transition: 0.2s;
      box-shadow: 0 0 15px rgba(139,92,246,0.2);
    }
    .product-card:hover {
      border-color: #ff2a9d;
      transform: translateY(-6px);
      box-shadow: 0 0 25px #ff2a9d;
    }
    .product-image {
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
    }
    .product-image img {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 8px #ff2a9d);
    }
    .product-name {
      font-weight: 600;
      font-size: 18px;
      margin: 8px 0;
    }
    .price-badge {
      display: inline-block;
      background: #ff2a9d;
      color: #fff;
      border-radius: 20px;
      padding: 6px 18px;
      font-weight: 700;
      font-size: 16px;
      box-shadow: 0 0 12px #ff2a9d;
    }
    .product-actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    /* ---- ACCOUNT & WISHLIST PAGES ---- */
    .user-profile {
      background: rgba(255,255,255,0.05);
      border: 1px solid #8b5cf6;
      border-radius: 16px;
      padding: 20px;
      margin: 20px 0;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .profile-avatar {
      width: 64px; height: 64px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #ff2a9d;
    }
    .order-card, .wishlist-item {
      background: rgba(255,255,255,0.05);
      border: 1px solid #8b5cf6;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    /* ---- MODAL ---- */
    .modal {
      position: fixed; top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: flex-end;
      z-index: 200;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #1a0f2e;
      width: 420px;
      height: 100%;
      padding: 24px;
      border-left: 1px solid #ff2a9d;
      overflow-y: auto;
    }
    .close-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
    }

    /* ---- LIVE PURCHASE OVERLAY ---- */
    .live-purchase {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(17,7,31,0.9);
      border: 1px solid #ff2a9d;
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 13px;
      box-shadow: 0 0 15px #ff2a9d;
      z-index: 50;
    }

    /* ---- FOOTER ---- */
    footer {
      background: rgba(17,7,31,0.8);
      border-top: 1px solid #8b5cf6;
      padding: 20px;
      text-align: center;
      margin-top: 40px;
    }
    .online-dot {
      width: 10px; height: 10px;
      background: #22c55e;
      border-radius: 50%;
      box-shadow: 0 0 8px #22c55e;
    }

    @media (max-width: 768px) {
      .navbar { flex-direction: column; }
      .search-bar { width: 100%; }
      .modal-content { width: 100%; }
    }
  </style>
</head>
<body>
  <!-- AURA ELEMENT -->
  <div class="cursor-aura" id="cursorAura"></div>

  <!-- NAVIGATION -->
  <header class="navbar">
    <div class="nav-left">
      <div class="logo" onclick="goHome()">🤖 Xyoo</div>
      <nav class="nav-links">
        <button onclick="goHome()">🏠 Home</button>
        <button onclick="goToAccount()">👤 Account</button>
        <button onclick="goToWishlist()">❤️ Wishlist (<span id="wishlistCount">0</span>)</button>
        <span class="live-badge"><span class="live-dot"></span> LIVE</span>
      </nav>
    </div>
    <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
      <input type="text" class="search-bar" placeholder="Search items..." oninput="filterProducts(this.value)">
      <a href="https://discord.com/users/592402229978333331" target="_blank" class="sign-in-btn">Sign in</a>
      <button class="cart-btn" onclick="toggleCart()">
        🛒 Cart <span class="cart-badge" id="cartCount" style="display:none;">0</span>
      </button>
    </div>
  </header>

  <!-- HOME PAGE -->
  <div id="homePage" class="page-section active">
    <div class="banner container">
      <h2>🎮 XYOO CATALOG</h2>
      <a href="https://discord.gg/xyoo" target="_blank" class="messages-icon">💬</a>
    </div>

    <!-- WELCOME BANNER -->
    <div id="welcomeBanner" class="welcome-banner">
      <img id="welcomeAvatar" class="welcome-avatar" src="" alt="Avatar" style="display:none;">
      <span>👋 Welcome back, <strong id="welcomeName"></strong>!</span>
    </div>

    <!-- TRUST BADGES -->
    <div class="trust-badges">
      <span class="badge">100% SECURE</span>
      <span class="badge">FAST DELIVERY</span>
      <span class="badge">MANUAL</span>
      <span class="badge">BEST PRICES</span>
      <span class="badge">24/7 SUPPORT</span>
    </div>

    <!-- CATALOG -->
    <div class="container">
      <div class="category-tabs" id="categoryTabs"></div>
      <h2 class="catalog-title" id="catalogTitle">🛍️ All Products</h2>
      <div class="products-grid" id="productsGrid"></div>
    </div>
  </div>

  <!-- ACCOUNT PAGE -->
  <div id="accountPage" class="page-section">
    <div class="container">
      <h2>👤 My Account</h2>
      <div class="user-profile" id="profileCard">
        <img id="profileAvatar" class="profile-avatar" src="" alt="Avatar" style="display:none;">
        <div>
          <h3>Username: <span id="profileUsername" style="color:#ff2a9d;">Guest User</span></h3>
          <div>Total Orders: <span id="totalOrders">0</span></div>
        </div>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>📦 Order History</h3>
        <button class="btn" onclick="clearOrderHistory()">🗑️ Clear</button>
      </div>
      <div id="orderHistory"></div>
    </div>
  </div>

  <!-- WISHLIST PAGE -->
  <div id="wishlistPage" class="page-section">
    <div class="container">
      <h2>❤️ My Wishlist</h2>
      <div id="wishlistItems"></div>
    </div>
  </div>

  <!-- CART MODAL -->
  <div class="modal" id="cartModal">
    <div class="modal-content">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>🛒 Cart</h2>
        <button class="close-btn" onclick="toggleCart()">✕</button>
      </div>
      <div id="cartView"></div>
    </div>
  </div>

  <!-- LIVE PURCHASE OVERLAY -->
  <div class="live-purchase">🛍️ bridger: WESTERN 22</div>

  <!-- FOOTER -->
  <footer>
    <div><span class="online-dot"></span> Online</div>
    <a href="https://discord.gg/xyoo" target="_blank" class="btn" style="margin-top:10px;">Discord.gg/xyoo</a>
  </footer>

  <script>
    // ---------- AURA CURSOR ----------
    const aura = document.getElementById('cursorAura');
    let mouseX = window.innerWidth/2, mouseY = window.innerHeight/2, curX = mouseX, curY = mouseY;
    document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
    function animateAura() {
      curX += (mouseX - curX) * 0.15;
      curY += (mouseY - curY) * 0.15;
      aura.style.left = curX + 'px';
      aura.style.top = curY + 'px';
      requestAnimationFrame(animateAura);
    }
    animateAura();

    // ---------- GLOBALS ----------
    const API_KEY = 'fzRFHIqB8u2WCU5mvGyPZK4tdj9Yw3gcrhLE7MSnVoeiplskTXaQO6bN0AxDJ1';
    let allProducts = [];
    let selectedCategory = 'All';

    // ---------- STATE (cart, wishlist, orders, user) ----------
    window.cart = JSON.parse(localStorage.getItem('xyoo_cart')) || [];
    window.wishlist = JSON.parse(localStorage.getItem('xyoo_wishlist')) || [];
    window.orderHistory = [];
    window.selectedGame = { name: "Grow A Garden 2", image: "/static/gag2.png", products: [] };
    window.selectedPayment = '';

    function getStoredUsername() { return localStorage.getItem('xyoo_username') || 'Guest User'; }
    function getStoredUserId() { return localStorage.getItem('xyoo_user_id'); }
    function getStoredAvatar() { return localStorage.getItem('xyoo_avatar') || ''; }

    async function loadUserFromParam() {
      const params = new URLSearchParams(window.location.search);
      const userId = params.get('user');
      if (!userId) return;
      try {
        const res = await fetch(`/api/user/${userId}`);
        if (!res.ok) return;
        const user = await res.json();
        localStorage.setItem('xyoo_username', user.display_name || user.username);
        localStorage.setItem('xyoo_user_id', userId);
        if (user.avatar_url) localStorage.setItem('xyoo_avatar', user.avatar_url);
        updateWelcomeBanner();
        updateProfileAvatar();
        await fetchUserOrders();
      } catch (e) { console.error(e); }
    }

    function updateWelcomeBanner() {
      const name = getStoredUsername();
      const avatarUrl = getStoredAvatar();
      if (name !== 'Guest User') {
        document.getElementById('welcomeName').textContent = name;
        document.getElementById('welcomeBanner').classList.add('show');
        const img = document.getElementById('welcomeAvatar');
        if (avatarUrl) { img.src = avatarUrl; img.style.display = 'inline-block'; }
        else img.style.display = 'none';
      } else {
        document.getElementById('welcomeBanner').classList.remove('show');
      }
    }

    function updateProfileAvatar() {
      const avatarUrl = getStoredAvatar();
      const img = document.getElementById('profileAvatar');
      if (avatarUrl) { img.src = avatarUrl; img.style.display = 'inline-block'; }
      else img.style.display = 'none';
    }

    function updateProfileDisplay() {
      document.getElementById('profileUsername').textContent = getStoredUsername();
      updateProfileAvatar();
      if (document.getElementById('homePage').classList.contains('active')) updateWelcomeBanner();
    }

    // ---------- ORDERS ----------
    async function fetchUserOrders() {
      const userId = getStoredUserId();
      if (!userId) { window.orderHistory = []; renderOrderHistory(); return; }
      try {
        const res = await fetch(`/api/user/orders/${userId}`);
        if (!res.ok) return;
        window.orderHistory = await res.json();
        renderOrderHistory();
        document.getElementById('totalOrders').textContent = window.orderHistory.length;
      } catch (e) { console.error(e); }
    }

    async function saveOrderToServer(order, userId) {
      try {
        await fetch('/api/user/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
          body: JSON.stringify({ ...order, user_id: userId })
        });
      } catch (e) { console.error(e); }
    }

    // ---------- DYNAMIC PRODUCT LOADING ----------
    async function fetchProducts() {
      try {
        const res = await fetch('/api/products');
        if (!res.ok) return;
        allProducts = await res.json();
        window.selectedGame.products = allProducts;
        renderCategoryTabs();
        renderProducts(allProducts);
      } catch (e) { console.error(e); }
    }

    function renderCategoryTabs() {
      const cats = ['All', ...new Set(allProducts.map(p => p.category))];
      document.getElementById('categoryTabs').innerHTML = cats.map(c =>
        `<button class="btn ${c === selectedCategory ? 'btn-primary' : ''}" onclick="selectCategory('${c}')">${c}</button>`
      ).join(' ');
    }

    function renderProducts(products) {
      const grid = document.getElementById('productsGrid');
      if (!products.length) {
        grid.innerHTML = '<p style="grid-column:1/-1; text-align:center;">No products found.</p>';
        return;
      }
      grid.innerHTML = products.map(p => `
        <div class="product-card">
          <div class="product-image"><img src="/static/${p.image}" alt="${p.name}"></div>
          <div class="product-name">${p.name}</div>
          <div class="price-badge">$${p.price.toFixed(2)}</div>
          <div class="product-actions">
            <button class="btn btn-primary" onclick="addToCart(${p.id})">Add to cart</button>
            <button class="btn ${window.wishlist.includes(p.id)?'btn-primary':''}" onclick="toggleWishlist(${p.id})">❤️</button>
          </div>
        </div>
      `).join('');
    }

    window.selectCategory = function(cat) {
      selectedCategory = cat;
      renderCategoryTabs();
      const filtered = cat === 'All' ? allProducts : allProducts.filter(p => p.category === cat);
      renderProducts(filtered);
    };

    window.filterProducts = function(query) {
      const q = query.toLowerCase();
      const filtered = allProducts.filter(p => p.name.toLowerCase().includes(q));
      renderProducts(filtered);
    };

    // ---------- CART ----------
    function saveCart() { localStorage.setItem('xyoo_cart', JSON.stringify(window.cart)); updateCartCount(); }
    function updateCartCount() {
      const total = window.cart.reduce((s,i) => s + i.quantity, 0);
      const badge = document.getElementById('cartCount');
      badge.textContent = total;
      badge.style.display = total > 0 ? 'flex' : 'none';
    }

    window.addToCart = function(productId) {
      const product = allProducts.find(p => p.id === productId);
      if (!product) return;
      const existing = window.cart.find(i => i.id === productId);
      if (existing) existing.quantity++;
      else window.cart.push({...product, quantity: 1, game: window.selectedGame.name});
      saveCart();
    };

    window.removeFromCart = function(id) {
      window.cart = window.cart.filter(i => i.id !== id);
      saveCart();
      if (document.getElementById('cartModal').classList.contains('active')) updateCartView();
    };

    window.updateQuantity = function(id, qty) {
      const item = window.cart.find(i => i.id === id);
      if (item) {
        if (qty <= 0) removeFromCart(id);
        else { item.quantity = qty; saveCart(); updateCartView(); }
      }
    };

    function updateCartView() {
      const view = document.getElementById('cartView');
      if (!window.cart.length) {
        view.innerHTML = '<p>Cart is empty.</p>';
        return;
      }
      const total = window.cart.reduce((s,i) => s + i.price * i.quantity, 0).toFixed(2);
      view.innerHTML = `
        ${window.cart.map(item => `
          <div style="display:flex; justify-content:space-between; margin-bottom:10px; align-items:center;">
            <span>${item.name}</span>
            <input type="number" min="1" value="${item.quantity}" onchange="updateQuantity(${item.id}, parseInt(this.value))" style="width:50px; background:#11071f; border:1px solid #8b5cf6; color:#fff; text-align:center;">
            <span>$${(item.price*item.quantity).toFixed(2)}</span>
            <button onclick="removeFromCart(${item.id})" style="background:none; border:none; color:#ff2a9d;">❌</button>
          </div>
        `).join('')}
        <hr style="border-color:#8b5cf6;">
        <div style="display:flex; justify-content:space-between;"><strong>Total:</strong><strong>$${total}</strong></div>
        <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="goToCheckout()">💳 Checkout</button>
      `;
    }

    window.goToCheckout = function() {
      if (!window.cart.length) return;
      const view = document.getElementById('cartView');
      const total = window.cart.reduce((s,i) => s + i.price * i.quantity, 0).toFixed(2);
      const storedUsername = getStoredUsername();
      const prefill = storedUsername !== 'Guest User' ? storedUsername : '';
      view.innerHTML = `
        <h3>Select Payment Method:</h3>
        <div id="paymentOptions">
          ${['💰 GCASH', '🌍 PAYPAL'].map(m => `
            <label class="btn" style="display:block; margin-bottom:8px; cursor:pointer;">
              <input type="radio" name="payment" value="${m}" ${window.selectedPayment===m?'checked':''}> ${m}
            </label>
          `).join('')}
        </div>
        <div style="margin:16px 0;">
          <label>Discord Username *</label>
          <input id="discordUserInput" class="search-bar" style="width:100%;" value="${prefill}" placeholder="username#0000" oninput="validateCheckoutForm()">
          <div id="discordError" style="color:#ff2a9d; font-size:12px; display:none;"></div>
        </div>
        <div><strong>Total: $${total}</strong></div>
        <button id="completeOrderBtn" class="btn btn-primary" style="width:100%;" disabled onclick="completeOrder()">✅ Complete Order</button>
        <button class="btn" style="width:100%; margin-top:8px;" onclick="updateCartView()">← Back</button>
      `;
      document.getElementById('paymentOptions').addEventListener('change', e => {
        if (e.target.name === 'payment') { window.selectedPayment = e.target.value; validateCheckoutForm(); }
      });
      validateCheckoutForm();
    };

    window.validateCheckoutForm = function() {
      const paymentSelected = !!window.selectedPayment;
      const discordInput = document.getElementById('discordUserInput');
      const discordValue = discordInput ? discordInput.value.trim() : '';
      const completeBtn = document.getElementById('completeOrderBtn');
      const errorDiv = document.getElementById('discordError');
      let errorMessage = '';
      if (!paymentSelected) errorMessage = 'Please select a payment method.';
      else if (!discordValue) errorMessage = 'Discord username is required.';
      if (completeBtn) {
        completeBtn.disabled = !!errorMessage;
        completeBtn.style.opacity = errorMessage ? '0.5' : '1';
        completeBtn.style.cursor = errorMessage ? 'not-allowed' : 'pointer';
      }
      if (errorDiv) {
        errorDiv.textContent = errorMessage;
        errorDiv.style.display = errorMessage ? 'block' : 'none';
      }
    };

    window.completeOrder = async function() {
      const discordInput = document.getElementById('discordUserInput');
      const discordValue = discordInput ? discordInput.value.trim() : '';
      if (!window.selectedPayment || !discordValue) { validateCheckoutForm(); return; }
      if (!window.cart.length) return;

      const orderId = 'ORD-' + Math.random().toString(36).substr(2, 9).toUpperCase();
      const total = parseFloat(window.cart.reduce((s,i) => s + i.price * i.quantity, 0).toFixed(2));
      const order = {
        id: orderId,
        date: new Date().toLocaleString(),
        items: window.cart.map(i => ({ name: i.name, price: i.price, quantity: i.quantity })),
        total,
        payment: window.selectedPayment,
        discordUser: discordValue,
        status: 'Pending Payment'
      };

      const userId = getStoredUserId();
      if (userId) {
        await saveOrderToServer(order, userId);
        window.orderHistory.push(order);
      } else {
        window.orderHistory.push(order);
      }
      renderOrderHistory();
      document.getElementById('totalOrders').textContent = window.orderHistory.length;

      const chosenPayment = window.selectedPayment;
      window.cart = [];
      window.selectedPayment = '';
      saveCart();
      document.getElementById('cartModal').classList.remove('active');

      let redirect = '/';
      if (chosenPayment === '💰 GCASH') redirect = `/payment-gcash.html?order=${orderId}&total=${total}`;
      else if (chosenPayment === '🌍 PAYPAL') redirect = `/payment-paypal.html?order=${orderId}&total=${total}`;
      window.location.href = redirect;
    };

    // ---------- WISHLIST ----------
    window.toggleWishlist = function(id) {
      const idx = window.wishlist.indexOf(id);
      if (idx > -1) window.wishlist.splice(idx, 1);
      else window.wishlist.push(id);
      localStorage.setItem('xyoo_wishlist', JSON.stringify(window.wishlist));
      updateWishlistCount();
      renderProducts(allProducts); // refresh current view
    };

    function updateWishlistCount() { document.getElementById('wishlistCount').textContent = window.wishlist.length; }

    function renderWishlist() {
      const container = document.getElementById('wishlistItems');
      if (!window.wishlist.length) {
        container.innerHTML = '<p>No items in wishlist.</p>';
        return;
      }
      const items = allProducts.filter(p => window.wishlist.includes(p.id));
      container.innerHTML = items.map(p => `
        <div class="wishlist-item" style="display:flex; justify-content:space-between; align-items:center; padding:10px; border:1px solid #8b5cf6; border-radius:12px; margin-bottom:8px;">
          <span>${p.name} - $${p.price.toFixed(2)}</span>
          <div>
            <button class="btn btn-primary" onclick="addToCart(${p.id})">Add</button>
            <button class="btn" onclick="toggleWishlist(${p.id})">❌</button>
          </div>
        </div>
      `).join('');
    }

    // ---------- ORDER HISTORY ----------
    function renderOrderHistory() {
      const container = document.getElementById('orderHistory');
      if (!window.orderHistory.length) {
        container.innerHTML = '<p>No orders yet.</p>';
        return;
      }
      container.innerHTML = window.orderHistory.map(o => `
        <div class="order-card">
          <div><strong>${o.id}</strong> - ${o.status}</div>
          <div>${o.date} | Total: $${o.total.toFixed(2)}</div>
        </div>
      `).join('');
    }

    window.clearOrderHistory = function() {
      window.orderHistory = [];
      renderOrderHistory();
      document.getElementById('totalOrders').textContent = '0';
    };

    // ---------- PAGE NAVIGATION ----------
    window.goHome = () => showPage('home');
    window.goToAccount = () => { showPage('account'); fetchUserOrders(); };
    window.goToWishlist = () => { showPage('wishlist'); renderWishlist(); };

    function showPage(page) {
      document.querySelectorAll('.page-section').forEach(el => el.classList.remove('active'));
      document.getElementById(page + 'Page').classList.add('active');
      updateProfileDisplay();
      if (page === 'home') fetchProducts();
    }

    window.toggleCart = function() {
      document.getElementById('cartModal').classList.toggle('active');
      if (document.getElementById('cartModal').classList.contains('active')) updateCartView();
    };

    // ---------- STARTUP ----------
    async function init() {
      await loadUserFromParam();
      updateProfileDisplay();
      await fetchProducts();
      updateCartCount();
      updateWishlistCount();
      document.getElementById('totalOrders').textContent = window.orderHistory.length;
    }
    init();
  </script>
</body>
</html>
